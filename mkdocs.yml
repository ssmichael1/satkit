site_name: SatKit
site_description: Satellite orbital mechanics library with Python bindings
site_url: https://satkit.dev/
repo_url: https://github.com/ssmichael1/satkit
repo_name: ssmichael1/satkit

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: blue grey
      accent: blue grey
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: blue grey
      accent: blue grey
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.path
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
    - toc.follow

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [python]
          options:
            allow_inspection: false
            show_source: false
            show_bases: false
            members_order: source
            docstring_style: google
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
  - mkdocs-jupyter:
      execute: true
      kernel_name: python3
      include_source: true
      include_requirejs: false
      execute_ignore:
        - "tutorials/.ipynb_checkpoints/*"

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Data Files: getting-started/datafiles.md
  - Learn:
      - tutorials/index.md
      - Foundations:
          - Time Systems: tutorials/Time Systems.ipynb
          - Quaternions: tutorials/Quaternions.ipynb
          - ITRF Coordinates: tutorials/ITRF Coordinates.ipynb
          - Coordinate Frame Transforms: tutorials/Coordinate Frame Transforms.ipynb
          - Keplerian Elements: tutorials/Keplerian Elements.ipynb
      - Orbit Propagation:
          - "Theory: Force Models & Propagation": guide/satprop.md
          - "Theory: TLEs, SGP4 & OMMs": guide/tle.md
          - Two-Line Element Set: tutorials/Two-Line Element Set.ipynb
          - High Precision Propagation: tutorials/High Precision Propagation.ipynb
          - SGP4 vs Numerical Propagation: tutorials/SGP4 vs Numerical Propagation.ipynb
          - Orbit Maneuvers: tutorials/Orbit Maneuvers.ipynb
          - TLE Fitting: tutorials/TLE Fitting.ipynb
      - Applications:
          - Plots: tutorials/Plots.ipynb
          - Satellite Ground Contacts: tutorials/Satellite Ground Contacts.ipynb
          - Eclipse: tutorials/Eclipse.ipynb
          - Sunrise & Sunset: tutorials/riseset.ipynb
          - Optical Observations: tutorials/Optical Observations of Satellites.ipynb
      - Advanced Topics:
          - "Theory: Lambert's Problem": guide/lambert.md
          - Lambert Targeting: tutorials/Lambert Targeting.ipynb
          - Planetary Ephemerides: tutorials/Planetary Ephemerides.ipynb
          - Atmospheric Density: tutorials/Atmospheric Density.ipynb
          - Covariance Propagation: tutorials/Covariance Propagation.ipynb
          - Orbital Mean-Element Message: tutorials/Orbital Mean-Element Message.ipynb
      - References: guide/references.md
  - API Reference:
      - api/index.md
      - time: api/time.md
      - quaternion: api/quaternion.md
      - TLE & SGP4: api/tle.md
      - itrfcoord: api/itrfcoord.md
      - Frame Transforms: api/frametransform.md
      - Propagation: api/satprop.md
      - Satellite State: api/satstate.md
      - Sun: api/sun.md
      - Moon: api/moon.md
      - Planets: api/planets.md
      - JPL Ephemerides: api/jplephem.md
      - Density: api/density.md
      - Gravity: api/gravity.md
      - Kepler: api/kepler.md
      - Lambert: api/lambert.md
      - Constants: api/consts.md
      - Utilities: api/utils.md
